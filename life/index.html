<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Life Productivity Control Panel</title>
  <style>
    :root{--bg:#020817;--panel:#0f172a;--border:#1f2937;--border2:#334155;--text:#e5eefc;--muted:#94a3b8;--muted2:#64748b;--indigo:99 102 241;--emerald:16 185 129;--rose:244 63 94;--amber:245 158 11;--sky:56 189 248;--fuchsia:217 70 239;--shadow:0 20px 40px rgba(0,0,0,.25)}
    *{box-sizing:border-box} body{margin:0;font-family:Inter,system-ui,sans-serif;background:linear-gradient(180deg,#020617,#020817 35%,#020617);color:var(--text)}
    .app{max-width:1440px;margin:0 auto;padding:18px}.topbar{display:flex;justify-content:space-between;gap:16px;align-items:flex-end;flex-wrap:wrap;margin-bottom:18px}
    .eyebrow{font-size:12px;letter-spacing:.25em;text-transform:uppercase;color:var(--muted)} h1{font-size:clamp(28px,4vw,50px);margin:6px 0 0;line-height:1.02}
    .subtitle{color:var(--muted);max-width:850px;margin-top:10px}.btn{border:1px solid var(--border2);background:var(--panel);color:var(--text);border-radius:16px;padding:10px 14px;cursor:pointer;font:inherit}
    .btn:hover{border-color:#475569}.btn.primary{background:rgba(var(--indigo),.18);border-color:rgba(var(--indigo),.35);color:#c7d2fe}.btn.soft{background:#0b1220}.btn.danger{background:rgba(var(--rose),.12);border-color:rgba(var(--rose),.22);color:#fecdd3}
    .tabs{display:flex;gap:10px;flex-wrap:wrap;margin:14px 0 18px}.tab.active{background:rgba(var(--indigo),.18);border-color:rgba(var(--indigo),.35);color:#c7d2fe}
    .collapsible{overflow:hidden;transition:max-height .25s ease,opacity .2s ease}.hidden-collapsed{max-height:0;opacity:0}.shown-collapsed{max-height:500px;opacity:1;margin-bottom:18px}
    .card{background:rgba(15,23,42,.92);border:1px solid var(--border);border-radius:28px;box-shadow:var(--shadow);padding:18px}.rules-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
    .rule-card,.mini-card{background:rgba(2,6,23,.55);border:1px solid var(--border);border-radius:18px;padding:12px 14px}
    .grid-main{display:grid;grid-template-columns:360px 1fr;gap:18px}.left-col{position:sticky;top:18px;align-self:start}.section-title{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:14px}.section-title h2{margin:0;font-size:20px}
    .small{font-size:12px;color:var(--muted)} label{display:block;color:var(--muted);font-size:13px;margin-bottom:6px}
    input,select{width:100%;background:#020617;border:1px solid var(--border2);color:var(--text);border-radius:14px;padding:10px 12px;font:inherit;outline:none}
    .two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px}.stack{display:grid;gap:12px}.placed-block{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
    .palette-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.limits{display:grid;gap:10px}.bar{height:10px;background:#111827;border:1px solid var(--border);border-radius:999px;overflow:hidden}.bar>div{height:100%;background:linear-gradient(90deg,#818cf8,#34d399)}
    .timeline-layout{display:grid;grid-template-columns:230px 1fr;gap:16px}.block-editor-list{display:grid;gap:10px}.block-editor-card{border:1px solid var(--border);background:#0b1220;border-radius:18px;padding:14px}
    .timeline-wrap{border:1px solid var(--border);background:rgba(2,6,23,.35);border-radius:26px;padding:14px;overflow:auto}.timeline-grid{display:grid;grid-template-columns:56px 1fr;gap:14px;min-width:640px}
    .time-col{position:relative}.time-label{position:absolute;left:0;right:0;font-size:11px;font-weight:600;color:var(--muted2)}.calendar{position:relative;border:1px solid var(--border);border-radius:22px;background:rgba(2,6,23,.25)}
    .line{position:absolute;left:0;right:0;border-top:1px solid rgba(51,65,85,.65)} .line.hour{border-top-color:#334155}
    .event{position:absolute;left:8px;right:8px;border-radius:18px;background:linear-gradient(180deg,rgba(99,102,241,.22),rgba(99,102,241,.12));border:1px solid rgba(129,140,248,.28);box-shadow:0 12px 24px rgba(30,41,59,.35);padding:10px 12px;overflow:hidden}
    .event-title{font-size:14px;font-weight:700;line-height:1.1}.event-time{font-size:12px;color:#cbd5e1;margin-top:6px}.week-grid,.review-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px}.week-card{background:rgba(2,6,23,.45);border:1px solid var(--border);border-radius:20px;padding:14px}.week-blocks{display:grid;gap:8px;margin-top:10px}
    .badge{display:inline-flex;padding:6px 10px;border-radius:999px;font-size:12px;border:1px solid transparent}.free,.reset{background:rgba(var(--indigo),.18);border-color:rgba(var(--indigo),.35);color:#c7d2fe}.split,.flight{background:rgba(var(--amber),.18);border-color:rgba(var(--amber),.35);color:#fde68a}.recovery{background:rgba(var(--sky),.18);border-color:rgba(var(--sky),.35);color:#bae6fd}.layover{background:rgba(var(--emerald),.18);border-color:rgba(var(--emerald),.35);color:#bbf7d0}.social{background:rgba(var(--fuchsia),.18);border-color:rgba(var(--fuchsia),.35);color:#f5d0fe}
    @media (max-width:1100px){.grid-main{grid-template-columns:1fr}.left-col{position:static}.timeline-layout{grid-template-columns:1fr}} @media (max-width:700px){.app{padding:12px}.palette-grid,.two-col{grid-template-columns:1fr}.timeline-grid{min-width:520px}}
  </style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div><div class="eyebrow">Life Operating System</div><h1>Weekly Productivity Control Panel</h1><div class="subtitle">Plan anchors and time blocks at the start of the week, then keep editing them as real life changes.</div></div>
    <button id="rulesToggle" class="btn soft">Rules</button>
  </div>
  <div id="rulesPanel" class="collapsible hidden-collapsed"></div>
  <div class="tabs" id="tabs"></div>
  <div id="appContent"></div>
</div>
<script>
const DAY_TYPES=["Free Day","Split Day","Flight Day","Recovery Day","Layover Day","Social Day","Reset Day"];
const TIMELINE_START=6*60,TIMELINE_END=24*60,SLOT_MINUTES=15,ROW_HEIGHT=28;
const state={rulesOpen:false,activeTab:"today",selectedDay:"Tue",newBlock:{title:"",duration:"30m"},rules:[["Wake-to-stand","Max 3 min"],["Morning phone","Messages + email only / 15 min"],["X / Twitter","Max 45 min"],["Shower","Max 10 min"],["Toilet","Target 5 min"],["Dating admin","Max 90 min"]],limits:[{label:"X / Twitter",used:20,total:45},{label:"Dating admin",used:35,total:90},{label:"Shower",used:8,total:10},{label:"Toilet",used:4,total:5}],reviews:[["Days under X cap","5 / 7"],["Wake rule obeyed","6 / 7"],["Gym completed","3 / 4 planned"],["Russian completed","4 / 5 planned"],["Biggest leak","Split days before flights"],["Best controlled day","Free Day"]],blockSuggestions:[{title:"Gym",duration:"75m"},{title:"Russian",duration:"30m"},{title:"Pre-flight prep",duration:"30m"},{title:"Pre-flight nap",duration:"120m"},{title:"Deep work",duration:"90m"},{title:"Date",duration:"120m"},{title:"Walk",duration:"45m"},{title:"Reading",duration:"30m"}],week:[]};
const esc=s=>String(s).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#39;");
const parseTime=v=>{if(!v||!v.includes(":")) return null; const [h,m]=v.split(":").map(Number); return Number.isNaN(h)||Number.isNaN(m)?null:h*60+m;};
const fmtTime=t=>{const s=((t%1440)+1440)%1440,h=Math.floor(s/60),m=s%60; return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`;};
const parseDur=v=>{if(!v) return 0; const n=parseInt(String(v).trim().toLowerCase().replace(/[^0-9]/g,""),10); return Number.isNaN(n)?0:n;};
const fmtDur=m=>!m||m<=0?"—":m%60===0?`${m/60}h`:m>60?`${Math.floor(m/60)}h ${m%60}m`:`${m}m`;
const enrich=b=>{const s=parseTime(b.startTime),d=parseDur(b.duration); return {...b,duration:d>0?fmtDur(d):(b.duration||"30m"),durationMin:d,startMin:s,endTime:s!==null&&d>0?fmtTime(s+d):"—"};};
const createDay=(day,type,anchor,wakeTime,blocks)=>({day,type,anchor,wakeTime,blocks:blocks.map(enrich).sort((a,b)=>(a.startMin??0)-(b.startMin??0))});
const slots=[]; for(let t=TIMELINE_START;t<=TIMELINE_END;t+=SLOT_MINUTES) slots.push({label:fmtTime(t),minutes:t});
state.week=[createDay("Mon","Free Day","","07:30",[{id:1,title:"Gym",startTime:"10:00",duration:"75m"},{id:2,title:"Russian",startTime:"13:00",duration:"30m"}]),createDay("Tue","Split Day","","07:30",[{id:3,title:"Gym",startTime:"09:00",duration:"75m"},{id:4,title:"Russian",startTime:"11:30",duration:"30m"},{id:5,title:"Pack suitcase",startTime:"15:00",duration:"30m"},{id:6,title:"Pre-flight nap",startTime:"15:45",duration:"120m"},{id:7,title:"Pre-flight prep",startTime:"18:30",duration:"30m"}]),createDay("Wed","Layover Day","","08:00",[{id:8,title:"Walk / explore",startTime:"16:00",duration:"45m"}]),createDay("Thu","Recovery Day","","08:30",[{id:9,title:"Recovery sleep",startTime:"09:00",duration:"120m"}]),createDay("Fri","Free Day","","07:45",[{id:10,title:"Deep work",startTime:"11:00",duration:"90m"}]),createDay("Sat","Social Day","Date night","08:30",[{id:11,title:"Prep",startTime:"18:30",duration:"30m"}]),createDay("Sun","Reset Day","","08:30",[{id:12,title:"Weekly planning",startTime:"19:00",duration:"30m"}])];
const selDay=()=>state.week.find(d=>d.day===state.selectedDay)||state.week[0];
const badge=t=>t.includes("Flight")||t.includes("Split")?"split":t.includes("Recovery")?"recovery":t.includes("Social")?"social":t.includes("Layover")?"layover":t.includes("Reset")?"reset":"free";
function updateDayField(day,field,value){state.week=state.week.map(i=>i.day===day?{...i,[field]:value}:i); render();}
function addBlock(){if(!state.newBlock.title.trim()) return; state.week=state.week.map(i=>i.day!==state.selectedDay?i:{...i,blocks:[...i.blocks,enrich({id:Date.now(),title:state.newBlock.title,startTime:"09:00",duration:state.newBlock.duration||"30m"})].sort((a,b)=>(a.startMin??0)-(b.startMin??0))}); state.newBlock={title:"",duration:"30m"}; render();}
function removeBlock(day,id){state.week=state.week.map(i=>i.day===day?{...i,blocks:i.blocks.filter(b=>b.id!==id)}:i); render();}
function assignBlockToTime(day,id,startTime){state.week=state.week.map(i=>i.day!==day?i:{...i,blocks:i.blocks.map(b=>b.id===id?enrich({...b,startTime}):b).sort((a,b)=>(a.startMin??0)-(b.startMin??0))}); render();}
function updateBlockDuration(day,id,value){state.week=state.week.map(i=>i.day!==day?i:{...i,blocks:i.blocks.map(b=>b.id===id?enrich({...b,duration:value}):b).sort((a,b)=>(a.startMin??0)-(b.startMin??0))}); render();}
function renderRules(){const p=document.getElementById("rulesPanel"); p.className=`collapsible ${state.rulesOpen?"shown-collapsed":"hidden-collapsed"}`; p.innerHTML=`<section class="card"><div class="section-title"><h2>Rules</h2><div class="small">Persistent</div></div><div class="rules-grid">${state.rules.map(([n,v])=>`<div class="rule-card"><div class="small">${n}</div><div style="margin-top:6px;font-weight:600">${v}</div></div>`).join("")}</div></section>`;}
function renderTabs(){const el=document.getElementById("tabs"); el.innerHTML=["today","week","review"].map(t=>`<button class="btn tab ${state.activeTab===t?"active":""}" data-tab="${t}">${t==="today"?"Today":t==="week"?"This Week":"Review"}</button>`).join(""); el.querySelectorAll("[data-tab]").forEach(b=>b.onclick=()=>{state.activeTab=b.dataset.tab; render();});}
function todayHTML(){const day=selDay(),timeHeight=slots.length*ROW_HEIGHT; return `<div class="grid-main"><section class="left-col"><div class="card stack"><div class="section-title"><div><h2>Today</h2><div class="small" style="margin-top:6px">${day.day} · ${day.type}</div></div><span class="badge ${badge(day.type)}">${esc(day.anchor||"No anchor")}</span></div><div class="mini-card"><label>Wake-up alarm</label><div class="two-col"><select id="wakeHour">${Array.from({length:24},(_,i)=>String(i).padStart(2,"0")).map(h=>`<option ${day.wakeTime.split(":")[0]===h?"selected":""}>${h}</option>`).join("")}</select><select id="wakeMinute">${["00","05","10","15","20","25","30","35","40","45","50","55"].map(m=>`<option ${day.wakeTime.split(":")[1]===m?"selected":""}>${m}</option>`).join("")}</select></div></div><div class="mini-card"><div class="small" style="margin-bottom:10px">Placed blocks</div><div class="stack">${day.blocks.map(b=>`<div class="placed-block"><div><div style="font-weight:600">${esc(b.title)}</div><div class="small" style="margin-top:6px">${b.startTime} → ${b.endTime} · ${b.duration}</div></div><button class="btn danger" data-remove="${b.id}" style="padding:6px 10px">×</button></div>`).join("")}</div></div><div class="mini-card"><div class="small" style="margin-bottom:10px">Block palette</div><div class="small" style="margin-bottom:12px;color:var(--muted2)">Cleaner calendar view · 15-minute grid · blocks span real duration</div><div class="palette-grid">${state.blockSuggestions.map(i=>`<button class="btn soft" data-suggestion="${esc(i.title)}" data-duration="${i.duration}" style="text-align:left"><div style="font-weight:600">${esc(i.title)}</div><div class="small" style="margin-top:4px">${i.duration}</div></button>`).join("")}</div><div class="stack" style="margin-top:12px"><input id="newBlockTitle" placeholder="Task / block title" value="${esc(state.newBlock.title)}"><input id="newBlockDuration" placeholder="Duration e.g. 30m / 45m / 90m" value="${esc(state.newBlock.duration)}"><button id="addBlockBtn" class="btn primary">Add block for ${day.day}</button></div></div><div class="limits">${state.limits.map(i=>`<div class="mini-card"><div class="placed-block"><span>${i.label}</span><strong>${i.used} / ${i.total} min</strong></div><div class="bar" style="margin-top:10px"><div style="width:${Math.min((i.used/i.total)*100,100)}%"></div></div></div>`).join("")}</div></div></section><section class="stack"><div class="card"><div class="section-title"><div><h2>Day editor</h2><div class="small" style="margin-top:6px">Pick a day, set its anchor if needed, and place work into real time blocks that can still change later.</div></div><div class="day-switches">${state.week.map(i=>`<button class="btn ${state.selectedDay===i.day?"primary":"soft"}" data-day="${i.day}">${i.day}</button>`).join("")}</div></div><div class="two-col"><div class="mini-card"><label>Day type</label><select id="dayTypeSelect">${DAY_TYPES.map(t=>`<option ${day.type===t?"selected":""}>${t}</option>`).join("")}</select></div><div class="mini-card"><label>Anchor</label><input id="anchorInput" value="${esc(day.anchor)}" placeholder="Optional main event"></div></div></div><div class="card"><div class="section-title"><div class="small">${day.day} time map</div><div class="small">15-minute grid · blocks visually span their real duration</div></div><div class="timeline-layout"><div class="block-editor-list">${day.blocks.map(b=>`<div class="block-editor-card"><div style="font-weight:700">${esc(b.title)}</div><div class="small" style="margin-top:6px">${b.startTime} → ${b.endTime}</div><div class="small">${b.duration}</div><div class="stack" style="margin-top:12px"><input data-duration-id="${b.id}" value="${esc(b.duration)}"><select data-time-id="${b.id}">${slots.map(s=>`<option ${s.label===b.startTime?"selected":""}>${s.label}</option>`).join("")}</select></div></div>`).join("")}</div><div class="timeline-wrap"><div class="timeline-grid"><div class="time-col" style="height:${timeHeight}px">${slots.map((s,i)=>`<div class="time-label" style="top:${i*ROW_HEIGHT-7}px">${s.label.endsWith(":00")?s.label:""}</div>`).join("")}</div><div class="calendar" style="height:${timeHeight}px">${slots.map((s,i)=>`<div class="line ${s.label.endsWith(":00")?"hour":""}" style="top:${i*ROW_HEIGHT}px;height:${ROW_HEIGHT}px"></div>`).join("")}${day.blocks.map(b=>{const start=parseTime(b.startTime); if(start===null) return ""; const top=((start-TIMELINE_START)/SLOT_MINUTES)*ROW_HEIGHT; const h=Math.max((b.durationMin/SLOT_MINUTES)*ROW_HEIGHT-2,ROW_HEIGHT-2); return `<div class="event" style="top:${top}px;height:${h}px"><div class="event-title">${esc(b.title)}</div><div class="event-time">${b.startTime} — ${b.endTime}</div><div class="small" style="margin-top:4px">${b.duration}</div></div>`;}).join("")}</div></div></div></div></section></div>`;}
function weekHTML(){return `<section class="card"><div class="section-title"><div><h2>This Week</h2><div class="small" style="margin-top:6px">At the start of the week, you place anchors and time blocks here. Then you can keep changing them as the week evolves.</div></div></div><div class="week-grid">${state.week.map(i=>`<div class="week-card"><div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px"><div style="font-size:20px;font-weight:700">${i.day}</div><span class="badge ${badge(i.type)}">${i.type}</span></div><div class="small">Anchor</div><div style="margin-top:4px">${esc(i.anchor||"—")}</div><div class="small" style="margin-top:12px">Wake-up alarm ${i.wakeTime}</div><div class="week-blocks">${i.blocks.map(b=>`<div class="mini-card"><div style="font-weight:600">${esc(b.title)}</div><div class="small" style="margin-top:4px">${b.startTime} → ${b.endTime} · ${b.duration}</div></div>`).join("")}</div><button class="btn primary" style="width:100%;margin-top:12px" data-edit-day="${i.day}">Edit ${i.day}</button></div>`).join("")}</div></section>`;}
function reviewHTML(){return `<section class="card"><div class="section-title"><h2>Weekly Review</h2><div class="small">Last 7 days</div></div><div class="review-grid">${state.reviews.map(([l,v])=>`<div class="mini-card placed-block"><span class="small">${l}</span><strong>${v}</strong></div>`).join("")}</div></section>`;}
function renderContent(){const el=document.getElementById("appContent"); el.innerHTML = state.activeTab==="today"?todayHTML():state.activeTab==="week"?weekHTML():reviewHTML();
 if(state.activeTab==="today"){const day=selDay(); document.getElementById("wakeHour").onchange=e=>updateDayField(day.day,"wakeTime",`${e.target.value}:${day.wakeTime.split(":")[1]}`); document.getElementById("wakeMinute").onchange=e=>updateDayField(day.day,"wakeTime",`${day.wakeTime.split(":")[0]}:${e.target.value}`); document.querySelectorAll("[data-remove]").forEach(b=>b.onclick=()=>removeBlock(day.day,Number(b.dataset.remove))); document.querySelectorAll("[data-suggestion]").forEach(b=>b.onclick=()=>{state.newBlock={title:b.dataset.suggestion,duration:b.dataset.duration}; render();}); document.getElementById("newBlockTitle").oninput=e=>state.newBlock.title=e.target.value; document.getElementById("newBlockDuration").oninput=e=>state.newBlock.duration=e.target.value; document.getElementById("addBlockBtn").onclick=addBlock; document.querySelectorAll("[data-day]").forEach(b=>b.onclick=()=>{state.selectedDay=b.dataset.day; render();}); document.getElementById("dayTypeSelect").onchange=e=>updateDayField(day.day,"type",e.target.value); document.getElementById("anchorInput").oninput=e=>updateDayField(day.day,"anchor",e.target.value); document.querySelectorAll("[data-duration-id]").forEach(i=>i.oninput=e=>updateBlockDuration(day.day,Number(i.dataset.durationId),e.target.value)); document.querySelectorAll("[data-time-id]").forEach(s=>s.onchange=e=>assignBlockToTime(day.day,Number(s.dataset.timeId),e.target.value));}
 if(state.activeTab==="week"){document.querySelectorAll("[data-edit-day]").forEach(b=>b.onclick=()=>{state.selectedDay=b.dataset.editDay; state.activeTab="today"; render();});}}
function renderRules(){const p=document.getElementById("rulesPanel"); p.className=`collapsible ${state.rulesOpen?"shown-collapsed":"hidden-collapsed"}`; p.innerHTML=`<section class="card"><div class="section-title"><h2>Rules</h2><div class="small">Persistent</div></div><div class="rules-grid">${state.rules.map(([n,v])=>`<div class="rule-card"><div class="small">${n}</div><div style="margin-top:6px;font-weight:600">${v}</div></div>`).join("")}</div></section>`;}
function renderTabs(){const el=document.getElementById("tabs"); el.innerHTML=["today","week","review"].map(t=>`<button class="btn tab ${state.activeTab===t?"active":""}" data-tab="${t}">${t==="today"?"Today":t==="week"?"This Week":"Review"}</button>`).join(""); el.querySelectorAll("[data-tab]").forEach(b=>b.onclick=()=>{state.activeTab=b.dataset.tab; render();});}
function render(){renderRules(); renderTabs(); renderContent();}
document.getElementById("rulesToggle").onclick=()=>{state.rulesOpen=!state.rulesOpen; render();}; render();
</script>
</body>
</html>
